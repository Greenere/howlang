<!DOCTYPE html>
<html>
  <head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <svg id="automata" width="1000" height="500"></svg>
    <script>
          var svg = d3.select("svg#automata");
          var width = svg.attr("width");
          var height = svg.attr("height");

          var linkGroup = svg.append("g").attr("id", "links");
          var nodeGroup = svg.append("g").attr("id", "nodes");

          var color = (type)=>{
            if (type == "NORMAL"){
              return "black";
            }
            if (type == "START"){
              return "red";
            }
            if (type == "CONDITION"){
              return "green";
            }
            return "blue";
          }
          var node_size = (type)=>{
            if (type == "CONDITION"){
              return 1;
            }
            return 10;
          }
          var label_text = (d) => {
            if (d.type == "NORMAL"){
              return d.id;
            }
            if (d.type == "CONDITION"){
              return d.name;
            }
            return d.id + ":" + d.type;
          }
          var terminal_force = (type)=>{
            if (type == "NORMAL"){
              return width/2;
            }
            if (type == "START"){
              return width * 0.05;
            }
            if (type == "CONDITION"){
              return width/2;
            }
            return width * 0.8;
          }
          var is_terminal = (type)=>{
            if (type == "NORMAL" || type == "START" || type == "CONDITION"){
              return false;
            }
            return true;
          }
          var linkColor = "black";

          const refX = 20;
          const refY = 0;
          const markerWidth = 15;
          const markerHeight = 15;

          const nodeSize = 10;

          linkGroup
            .append("defs")
            .append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", refX)
            .attr("refY", refY)
            .attr("markerWidth", markerWidth)
            .attr("markerHeight", markerHeight)
            .attr("orient", "auto")
            .attr("fill", linkColor)
            .append("path")
            .attr("d", "M0,-5L10,0L0,5");

          d3.json("automata.json").then((automata) => {
            var graph = automata.data;

            var simulation = d3
              .forceSimulation()
              .nodes(graph.nodes)
              .force(
                "links",
                d3
                  .forceLink()
                  .links(graph.links)
                  .id((d) => d.id)
                  .distance(1)
              )
              .force(
                "binds",
                d3
                  .forceLink()
                  .links(graph.binds)
                  .id((d) => d.id)
                  .distance(1)
              )
              .force("repulse", d3.forceManyBody().strength(-2500))
              .force(
                "centerx",
                d3
                  .forceX()
                  .x((d) => terminal_force(d.type))
                  .strength(0.5)
              )
              .force(
                "centery",
                d3
                  .forceY()
                  .y((d) => height /2)
                  .strength(1)
              )
              .force(
                "terminal_align",
                d3
                  .forceY()
                  .y((d) => height*0.8)
                  .strength((d)=>is_terminal(d.type)?5:0)
              )
              .force(
                "start_align",
                d3
                  .forceY()
                  .y((d) => height*0.1)
                  .strength((d)=>d.type=="START"?5:0)
              )
              .on("tick", ticked);

            simulation.stop();

            var line_gen = d3.line()
                  .x((p) => p.x)
                  .y((p) => p.y)
                  .curve(d3.curveCardinal);
            var loop_gen = d3.line()
                  .x((p) => p.x)
                  .y((p) => p.y)
                  .curve(d3.curveCardinalClosed);
            
            var get_bind = (bind)=>{
              nodes = graph.nodes;
              for (i = 0; i < nodes.length; i++){
                if (nodes[i].id == bind) {
                  return nodes[i];
                }
              }
            }

            var get_curve_points = (link) =>{
              bind_point = get_bind(link.bind);
              return [{x:link.source.x, y:link.source.y},
                      {x:bind_point.x, y:bind_point.y},
                      {x:link.target.x, y:link.target.y}];
            }

            var get_curve_points_loop = (link) =>{
              bind_point = get_bind(link.bind);
              return [{x:link.source.x, y:link.source.y},
                      {x:link.source.x, y:bind_point.y},
                      {x:bind_point.x, y:bind_point.y},
                      {x:bind_point.x, y:link.target.y},
                      {x:link.target.x, y:link.target.y}];
            }

            var get_path = (link) =>{
              if (link.source.id != link.target.id){
                return line_gen(get_curve_points(link));
              }
              return loop_gen(get_curve_points_loop(link));
            }

            var lines = linkGroup
              .selectAll("path.links")
              .data(graph.links).join(
              (enter) => {
                enter
                  .append("path")
                  .attr("class", `link`)
                  .attr("stroke", linkColor)
                  .attr("opacity", 0.2)
                  .attr("d", (d)=>get_path(d))
                  .attr("fill", "none")
                  .attr("marker-end", "url(#arrowhead)");
              },
              (update) => {
                update.attr("d", (d)=>get_path(d))
              }
            );

            var nodes = nodeGroup
              .selectAll("circle.node")
              .data(graph.nodes)
              .join(
                (enter) =>
                  enter
                    .append("circle")
                    .attr("class", "node")
                    .attr("stroke", "none")
                    .attr("r", (d)=>node_size(d.type))
                    .attr("cx", (d) => d.x)
                    .attr("cy", (d) => d.y)
                    .attr("fill", (d) => color(d.type))
                    .attr("opacity", 1)
                    .call(
                  d3
                    .drag()
                    .on("start", dragstart)
                    .on("drag", dragging)
                    .on("end", dragend)
                ),
                (update) => {
                  update.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
                }
              );

            let texts = nodeGroup
              .selectAll("text.labels")
              .data(graph.nodes)
              .join(
                (enter) =>
                  enter
                    .append("text")
                    .attr("class", "labels")
                    .attr("x", (d) => d.x + nodeSize)
                    .attr("y", (d) => d.y + nodeSize)
                    .text((d) => label_text(d)),
                (update) => {
                  update.attr("x", (d) => d.x + nodeSize)
                  .attr("y", (d) => d.y + nodeSize);
                }
              );

            simulation.tick(10);
            simulation.restart();

            lines = linkGroup.selectAll("path.link");
            circles = nodeGroup.selectAll("circle.node");
            texts = nodeGroup.selectAll("text.labels");

            function ticked() {
              lines
               .attr("d", (d)=>get_path(d))
              circles.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
              texts.attr("x", (d) => d.x + nodeSize)
              .attr("y", (d) => d.y + nodeSize);
            }

            function dragstart(event, d) {
        if (!event.active) {
          simulation.alphaTarget(0.08).restart();
        }
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragging(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragend(event, d) {
        if (!event.active) {
          simulation.alphaTarget(0);
        }
        d.fx = null;
        d.fy = null;
      }
    });
    </script>
  </body>
</html>
