name: Release Linter

on:
  workflow_call:
  workflow_dispatch:

jobs:
  package-linter:
    name: Package VS Code Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: howlang-vscode-lint/package-lock.json

      - name: Install dependencies
        working-directory: howlang-vscode-lint
        run: npm ci

      - name: Package extension
        working-directory: howlang-vscode-lint
        run: npx @vscode/vsce package --out howlang-vscode-lint.vsix

      - name: Upload linter artifact
        uses: actions/upload-artifact@v4
        with:
          name: howlang-vscode-lint
          path: howlang-vscode-lint/howlang-vscode-lint.vsix
